services:
  localstack:
    image: localstack/localstack:latest
    container_name: Bicycle-Demand-Prediction
    ports:
      - "0.0.0.0:4566:4566"
      - "0.0.0.0:4571:4571"
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
      - DEBUG=1
    volumes:
      - ./localstack_bootstrap:/etc/localstack/init/ready.d

volumes:
  localstack_data: